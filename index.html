<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付确认</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #fdfdfd; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .qr-code { width: 200px; margin: 20px 0; border: 1px solid #eee; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h3>会员支付</h3>
        <p>支付 19.9 元后点击下方按钮</p>
        <img src="pay_code.png" class="qr-code">
        <button class="btn" onclick="verify()">我已支付，通知老板</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function verify() {
            // 这种跳转方式不受 Telegram sendData 限制的影响
            // 请务必把 iop8900_bot 换成你真实的机器人用户名
            const bot_username = "iop8900_bot"; 
            tg.openTelegramLink(`https://t.me/${bot_username}?start=payverify`);
            tg.close();
        }
    </script>
</body>
</html>
